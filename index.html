                                                            <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>{ticker.cashSecuredPuts}</td>
                                                            <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>
                                                                {ticker.wins + ticker.losses > 0 
                                                                    ? ((ticker.wins / (ticker.wins + ticker.losses)) * 100).toFixed(1) + '%'
                                                                    : 'N/A'}
                                                            </td>
                                                        </tr>
                                                    ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )}

                                {/* Dividend Breakdown - Dividends Only */}
                                {incomeView !== 'options' && dividendAnalysis && (
                                    <div className={`rounded-lg shadow-md p-6 mb-6 ${cardClass}`}>
                                        <h2 className={`text-xl font-semibold mb-4 ${textClass}`}>Dividend Income by Ticker</h2>
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full divide-y divide-gray-200">
                                                <thead className={darkMode ? 'bg-gray-700' : 'bg-gray-50'}>
                                                    <tr>
                                                        <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Ticker</th>
                                                        <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Total Dividends</th>
                                                        <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Payments</th>
                                                        <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Avg Per Payment</th>
                                                    </tr>
                                                </thead>
                                                <tbody className={`divide-y ${darkMode ? 'divide-gray-700' : 'divide-gray-200'}`}>
                                                    {dividendAnalysis.byTicker
                                                        .sort((a, b) => b.totalDividends - a.totalDividends)
                                                        .map((ticker, idx) => (
                                                            <tr key={idx} className={darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-50'}>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm font-medium ${textClass}`}>{ticker.ticker}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${textClass}`}>
                                                                    ${ticker.totalDividends.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                </td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>{ticker.paymentCount}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>
                                                                    ${(ticker.totalDividends / ticker.paymentCount).toFixed(2)}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* All Trades - Options Only */}
                                {incomeView !== 'dividends' && (
                                <div className={`rounded-lg shadow-md p-3 sm:p-6 ${cardClass}`}>
                                    <h2 className={`text-xl font-semibold mb-4 ${textClass}`}>All Trades</h2>
                                    <div className="overflow-x-auto">
                                        <table className="min-w-full divide-y divide-gray-200">
                                            <thead className={darkMode ? 'bg-gray-700' : 'bg-gray-50'}>
                                                <tr>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Date</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Ticker</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Strategy</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Contracts</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Premium</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Strike</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Exp</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody className={`divide-y ${darkMode ? 'divide-gray-700' : 'divide-gray-200'}`}>
                                                {trades
                                                    .sort((a, b) => b.dateObj - a.dateObj)
                                                    .map((trade, idx) => {
                                                        // Check if trade falls within date range filter
                                                        let isInRange = true;
                                                        
                                                        if (dateRange.start) {
                                                            const startDate = new Date(dateRange.start);
                                                            isInRange = isInRange && trade.dateObj >= startDate;
                                                        }
                                                        
                                                        if (dateRange.end) {
                                                            const endDate = new Date(dateRange.end);
                                                            endDate.setHours(23, 59, 59, 999);
                                                            isInRange = isInRange && trade.dateObj <= endDate;
                                                        }
                                                        
                                                        // Apply highlight styling if in range
                                                        const highlightClass = isInRange && (dateRange.start || dateRange.end)
                                                            ? (darkMode ? 'bg-blue-900 bg-opacity-30 border-l-4 border-blue-500' : 'bg-blue-50 border-l-4 border-blue-400')
                                                            : '';
                                                        
                                                        return (
                                                            <tr key={idx} className={`${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-50'} ${highlightClass}`}>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${textClass}`}>{trade.date}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm font-medium ${textClass}`}>{trade.symbol}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>{trade.strategy}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>{trade.quantity}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm`}>
                                                                    <span className={trade.amount > 0 ? 'text-green-600' : 'text-red-600'}>
                                                                        ${Math.abs(trade.amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                    </span>
                                                                </td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>
                                                                    {trade.strikePrice ? '$' + trade.strikePrice : '-'}
                                                                </td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${subtextClass}`}>
                                                                    {trade.expiration || '-'}
                                                                </td>
                                                                <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                                    <div className="flex gap-2">
                                                                        <button
                                                                            onClick={() => rollTrade(trades.indexOf(trade))}
                                                                            className="text-green-600 hover:text-green-900 font-medium"
                                                                        >
                                                                            Roll
                                                                        </button>
                                                                        <button
                                                                            onClick={() => editTrade(trades.indexOf(trade))}
                                                                            className="text-blue-600 hover:text-blue-900"
                                                                        >
                                                                            Edit
                                                                        </button>
                                                                        <button
                                                                            onClick={() => deleteTrade(trades.indexOf(trade))}
                                                                            className="text-red-600 hover:text-red-900"
                                                                        >
                                                                            Delete
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )}

                                {/* All Dividend Payments - Dividends Only */}
                                {incomeView !== 'options' && dividends.length > 0 && (
                                <div className={`rounded-lg shadow-md p-3 sm:p-6 ${cardClass}`}>
                                    <h2 className={`text-xl font-semibold mb-4 ${textClass}`}>All Dividend Payments</h2>
                                    <div className="overflow-x-auto">
                                        <table className="min-w-full divide-y divide-gray-200">
                                            <thead className={darkMode ? 'bg-gray-700' : 'bg-gray-50'}>
                                                <tr>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Date</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Ticker</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Amount</th>
                                                    <th className={`px-6 py-3 text-left text-xs font-medium uppercase ${subtextClass}`}>Description</th>
                                                </tr>
                                            </thead>
                                            <tbody className={`divide-y ${darkMode ? 'divide-gray-700' : 'divide-gray-200'}`}>
                                                {dividends
                                                    .sort((a, b) => b.dateObj - a.dateObj)
                                                    .map((dividend, idx) => {
                                                        // Check if dividend falls within date range filter
                                                        let isInRange = true;
                                                        
                                                        if (dateRange.start) {
                                                            const startDate = new Date(dateRange.start);
                                                            isInRange = isInRange && dividend.dateObj >= startDate;
                                                        }
                                                        
                                                        if (dateRange.end) {
                                                            const endDate = new Date(dateRange.end);
                                                            endDate.setHours(23, 59, 59, 999);
                                                            isInRange = isInRange && dividend.dateObj <= endDate;
                                                        }
                                                        
                                                        // Apply highlight styling if in range
                                                        const highlightClass = isInRange && (dateRange.start || dateRange.end)
                                                            ? (darkMode ? 'bg-blue-900 bg-opacity-30 border-l-4 border-blue-500' : 'bg-blue-50 border-l-4 border-blue-400')
                                                            : '';
                                                        
                                                        return (
                                                            <tr key={idx} className={`${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-50'} ${highlightClass}`}>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm ${textClass}`}>{dividend.date}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm font-medium ${textClass}`}>{dividend.symbol}</td>
                                                                <td className={`px-6 py-4 whitespace-nowrap text-sm text-green-600`}>
                                                                    ${dividend.amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                </td>
                                                                <td className={`px-6 py-4 text-sm ${subtextClass}`}>{dividend.description}</td>
                                                            </tr>
                                                        );
                                                    })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )}
                            </>
                        )}

                        {!analysis && !dividendAnalysis && (
                            <div className={`rounded-lg shadow-md p-6 sm:p-12 text-center ${cardClass}`}>
                                <svg className={`mx-auto h-10 w-10 sm:h-12 sm:w-12 mb-3 sm:mb-4 ${subtextClass}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                                <h3 className={`text-base sm:text-lg font-medium mb-2 ${textClass}`}>No data yet</h3>
                                <p className={`text-sm ${subtextClass}`}>Upload a CSV or click "+ New" to get started</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<OptionsTracker />, document.getElementById('root'));
    </script>
    
    <script>
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
